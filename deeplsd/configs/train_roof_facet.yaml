data:
    name: roof_facet_ha
    image_dir: /mnt/harddrive/data/dataset/sam2_data/train/images
    gt_dir: gt_rooflines/hdf5
    val_size: 500
    batch_size: 32
    resize: [512, 512]
    num_workers: 4
    photometric_augmentation:
        enable: True
        primitives: ['random_brightness', 'random_contrast',
                     'additive_speckle_noise', 'additive_gaussian_noise',
                     'additive_shade', 'motion_blur']
        params:
            random_brightness:
                brightness: 0.3
            random_contrast:
                strength_range: [0.7, 1.3]
            additive_gaussian_noise:
                stddev_range: [0, 20]
            additive_speckle_noise:
                prob_range: [0, 0.005]
            additive_shade:
                transparency_range: [-0.5, 0.5]
                kernel_size_range: [100, 150]
            motion_blur:
                max_kernel_size: 3
    warped_pair: False
    homographic_augmentation: True
    seed: 0
model:
    name: deeplsd
    tiny: False
    sharpen: True
    line_neighborhood: 5
    loss_weights:
        df: 1.
        angle: 1.
    detect_lines: False
    line_detection_params:
        merge: False
        optimize: False
        use_vps: False
        optimize_vps: False
        filtering: True
        grad_thresh: 3
train:
    epochs: 100
    lr: 0.0001
    scheduler: 'ReduceLROnPlateau'
    patience: 10
    eval_every_iter: 2000
    log_every_iter: 200
    keep_last_checkpoints: 3
    seed: 0
